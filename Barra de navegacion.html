<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Web</title>
    <meta name="description" content="Mi sitio web">
    <style>
       body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #34495e;
            color: white;
            padding: 10px 20px;
        }

        .logo {
            font-weight: bold;
            font-size: 20px;
        }

        .menu-usuario a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        .menu-usuario a:hover {
            color: #1abc9c;
        }

        nav {
            background-color: #2c3e50;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        nav ul li {
            margin: 0;
        }

        nav ul li a {
            display: block;
            padding: 14px 20px;
            color: white;
            text-decoration: none;
        }

        nav ul li a:hover {
            background-color: #1abc9c;
        }

        main {
            padding: 20px;
        }

        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>

</head>

<body>

    <header>
        <div class="logo">Logo</div>
        <h1>Nombre Web</h1>
        <div class="menu-usuario">
            <a href="#">Login</a>
            <a href="#">Registro</a>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Servicios</a></li>
            <li><a href="#">Contacto</a></li>
        </ul>
    </nav>


    <main>
        <section>
            <h2>Contenido principal</h2>
            <p>Texto aquí.</p>
        </section>
    </main>

    <footer>
        <p>© 2026</p>
    </footer>

</body>

</html>
